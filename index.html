<!DOCTYPE html>
<html>
<head>
  <title>Masheica Thomas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f8f8f8;
      color: #222;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
      text-align: center;
      background: white;
    }

    .hero img {
      width: 280px;
      max-width: 90%;
      border-radius: 20px;
      margin-bottom: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }

    h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    p {
      max-width: 700px;
      font-size: 20px;
      line-height: 1.6;
    }

    .btn {
      display: inline-block;
      margin-top: 30px;
      padding: 14px 28px;
      background: black;
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<section class="hero">
  <img src="https://i.imgur.com/9X0pYQf.png" alt="Masheica Thomas" />

  <h1>Masheica Thomas</h1>

  <p>
    Virtual Executive Assistant, Social Media Manager, Creative Strategist,
    and Community Builder helping brands grow with organization,
    creativity, and purpose.
  </p>

  <a class="btn" href="#">
    Read My Blog
  </a>
</section>

</body>
</html>
